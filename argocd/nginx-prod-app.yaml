apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-prod
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/DKSASI2003/gitops-repo.git
    path: prod
    targetRevision: main

  destination:
    server: https://kubernetes.default.svc
    namespace: demo