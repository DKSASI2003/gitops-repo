apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-qa
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/DKSASI2003/gitops-repo.git
    path: qa
    targetRevision: main

  destination:
    server: https://kubernetes.default.svc
    namespace: demo

  syncPolicy:
    automated: {}