apiVersion: apps/1.0.0
kind: Deployment
metadata:
  name: nginx-demo
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-demo
  template:
    metadata:
      labels:
        app: nginx-demo
    spec:
      containers:
      - name: nginx-demo
        image: deepak2003/kargo-demo:1.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 80